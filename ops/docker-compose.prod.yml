services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: m-os-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-personal_llm_os}
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-personal_llm_os}
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped
    volumes:
      - m_os_pgdata:/var/lib/postgresql/data
  api:
    build:
      context: ..
      dockerfile: ops/Dockerfile.api
    container_name: m-os-api
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-personal_llm_os}
      JWT_PRIVATE_KEY_BASE64: ${JWT_PRIVATE_KEY_BASE64}
      JWT_PUBLIC_KEY_BASE64: ${JWT_PUBLIC_KEY_BASE64}
      MASTER_ENCRYPTION_KEY_BASE64: ${MASTER_ENCRYPTION_KEY_BASE64}
      AZURE_OLLAMA_BASE_URL: ${AZURE_OLLAMA_BASE_URL}
      AZURE_OLLAMA_MODEL: ${AZURE_OLLAMA_MODEL:-gemma4:e4b}
      AZURE_OLLAMA_FALLBACK_MODELS: ${AZURE_OLLAMA_FALLBACK_MODELS:-gemma3:12b,qwen3-coder:latest}
      HOSTINGER_OLLAMA_BASE_URL: ${HOSTINGER_OLLAMA_BASE_URL:-http://127.0.0.1:11434}
      HOSTINGER_OLLAMA_MODEL: ${HOSTINGER_OLLAMA_MODEL:-gemma3:4b}
      OLLAMA_EMBEDDING_MODEL: ${OLLAMA_EMBEDDING_MODEL:-nomic-embed-text}
      CORS_ORIGIN: ${CORS_ORIGIN}
      ALLOW_X_USER_ID_HEADER: ${ALLOW_X_USER_ID_HEADER:-false}
      RATE_LIMIT_MAX_PER_MINUTE: ${RATE_LIMIT_MAX_PER_MINUTE:-200}
      UPLOAD_DIR: /data/uploads
    expose:
      - 4000
    restart: unless-stopped
    ports:
      - ${M_OS_API_PORTS:-127.0.0.1:4400:4000}
    volumes:
      - m_os_uploads:/data/uploads
    depends_on:
      - postgres
    # Coolify / Traefik: expose /api on the public host (priority over catch-all / → web).
    # Set M_OS_PUBLIC_HOST to your bare domain (same as NEXT_PUBLIC_API_BASE_URL without https://).
    labels:
      - traefik.enable=true
      - traefik.http.routers.m-os-api.rule=Host(`${M_OS_PUBLIC_HOST:-noteos.in}`) && PathPrefix(`/api`)
      - traefik.http.routers.m-os-api.entrypoints=https
      - traefik.http.routers.m-os-api.tls=true
      - traefik.http.routers.m-os-api.tls.certresolver=letsencrypt
      - traefik.http.routers.m-os-api.priority=100
      - traefik.http.routers.m-os-api.service=m-os-api-svc
      - traefik.http.services.m-os-api-svc.loadbalancer.server.port=4000
  web:
    build:
      context: ..
      dockerfile: ops/Dockerfile.web
    container_name: m-os-web
    environment:
      NODE_ENV: production
      # SSR in m-os-web must call the api service by Docker DNS (not https://public host — hairpin hang).
      API_INTERNAL_BASE_URL: http://api:4000
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-https://noteos.in}
    expose:
      - 3000
    restart: unless-stopped
    ports:
      - ${M_OS_WEB_PORTS:-127.0.0.1:4300:3000}
    depends_on:
      - api
    # Coolify / Traefik: serve Next.js for the public host. Priority 1 so /api/* stays on m-os-api (100).
    labels:
      - traefik.enable=true
      - traefik.http.routers.m-os-web.rule=Host(`${M_OS_PUBLIC_HOST:-noteos.in}`)
      - traefik.http.routers.m-os-web.entrypoints=https
      - traefik.http.routers.m-os-web.tls=true
      - traefik.http.routers.m-os-web.tls.certresolver=letsencrypt
      - traefik.http.routers.m-os-web.priority=1
      - traefik.http.routers.m-os-web.service=m-os-web-svc
      - traefik.http.services.m-os-web-svc.loadbalancer.server.port=3000
volumes:
  m_os_pgdata: 
  m_os_uploads: 
  caddy_data: 
  caddy_config:
